<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PLURI Terapias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#EEF4FA;
    color:#233143;
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#0D3B66;
    color:white;
    position:fixed;
    padding:30px;
}

.logo{
    font-size:28px;
    font-weight:700;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu div{
    padding:14px 16px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.menu div:hover{
    background:rgba(255,255,255,.12);
}

.main{
    margin-left:250px;
    width:100%;
    padding:35px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    width:420px;
    background:white;
    padding:15px 20px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(13,59,102,.08);
}

.user{
    font-weight:600;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    border-radius:18px;
    padding:25px;
    color:white;
    box-shadow:0 14px 30px rgba(13,59,102,.15);
}

.card h2{
    font-size:34px;
    margin-bottom:8px;
}

.blue{
    background:#2E86DE;
}

.green{
    background:#27AE60;
}

.orange{
    background:#F39C12;
}

.red{
    background:#E74C3C;
}

.content{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.panel{
    background:#FFFFFF;
    border:1px solid #DCE7F5;
    border-radius:22px;
    padding:24px;
    box-shadow:0 15px 35px rgba(34,74,126,.10);
}

.panel h3{
    color:#0D3B66;
    margin-bottom:18px;
}

.panel-content{
    background:#F7F9FC;
    border:1px solid #E3EBF5;
    border-radius:18px;
    padding:20px;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 10px;
}

th{
    background:#EAF2FD;
    padding:15px;
    text-align:left;
}

td{
    background:white;
    padding:15px;
    border-top:1px solid #EEF2F6;
    border-bottom:1px solid #EEF2F6;
}

td:first-child{
    border-left:1px solid #EEF2F6;
    border-radius:10px 0 0 10px;
}

td:last-child{
    border-right:1px solid #EEF2F6;
    border-radius:0 10px 10px 0;
}

.progress{
    height:10px;
    background:#DCE7F5;
    border-radius:99px;
    overflow:hidden;
}

.progress span{
    display:block;
    height:100%;
    background:#2E86DE;
}

.bar{
    margin-bottom:18px;
}

.line{
    height:12px;
    background:#E3EDF7;
    border-radius:99px;
}

.line span{
    display:block;
    height:100%;
    background:#27AE60;
    border-radius:99px;
}

.schedule,
.alert{
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
}

.schedule{
    background:white;
    border:1px solid #E5EDF8;
}

.alert{
    background:#FFF7EA;
    border-left:5px solid #F39C12;
}

.bottom{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
    margin-top:22px;
}

@media(max-width:1100px){

.cards{
    grid-template-columns:repeat(2,1fr);
}

.content,
.bottom{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
PLURI
</div>

<div class="menu">

<div>🏠 Dashboard</div>

<div>👨‍⚕️ Pacientes</div>

<div>📋 Avaliações</div>

<div>🧩 Sessões</div>

<div>📈 Evolução</div>

<div>📄 Relatórios</div>

<div>⚙ Configurações</div>

</div>

</div>

<div class="main">

<div class="top">

<div class="search">
🔎 Buscar paciente...
</div>

<div class="user">
Dra. Mariana Costa
</div>

</div>

<div class="cards">

<div class="card blue">
<h2>128</h2>
Pacientes ativos
</div>

<div class="card green">
<h2>382</h2>
Avaliações este mês
</div>

<div class="card orange">
<h2>91%</h2>
Evolução média
</div>

<div class="card red">
<h2>7</h2>
Alertas importantes
</div>

</div>
